<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公共留言板</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="bg-decoration">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="title">📋 公共留言板</h1>
            <p class="subtitle">留下你想说的话</p>
        </header>

        <!-- 留言输入 -->
        <div class="form-card">
            <div class="input-group">
                <label>你的名字</label>
                <input type="text" id="nameInput" placeholder="输入名字..." maxlength="20" />
            </div>
            <div class="input-group">
                <label>留言内容</label>
                <textarea id="contentInput" placeholder="写点什么..." maxlength="500" rows="3"></textarea>
                <span class="char-count" id="charCount">0/500</span>
            </div>

            <!-- 文件上传工具栏 -->
            <div class="upload-toolbar">
                <button class="upload-btn" id="photoBtn" title="拍照/传图">📷 图片</button>
                <button class="upload-btn" id="voiceBtn" title="录音">🎤 录音</button>
                <span class="upload-status" id="uploadStatus"></span>
            </div>

            <!-- 预览区域 -->
            <div class="preview-area hidden" id="previewArea">
                <span class="preview-close" id="previewClose">✕</span>
                <div class="preview-content" id="previewContent"></div>
            </div>

            <!-- 隐藏的文件输入 -->
            <input type="file" id="fileInput" accept="image/*" capture="environment" hidden />
            <button class="submit-btn" id="submitBtn">📨 发布留言</button>
        </div>

        <!-- 留言列表 -->
        <div class="messages-section">
            <div class="messages-header">
                <h3>💬 全部留言</h3>
                <span class="msg-count" id="msgCount">0 条</span>
            </div>
            <div class="messages-list" id="messagesList">
                <div class="empty-state">还没有留言，来写第一条吧！</div>
            </div>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
